<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>VeriRisk AI | Processing Verification</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    setTimeout(function () {
      window.location.href = "../veririsk_ai_verification_results/verification-results.html";
    }, 3000);
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 80% 12%, rgba(211, 228, 254, 0.7) 0%, rgba(248, 249, 255, 0) 35%), #f8f9ff;
    }
    .loader {
      width: 72px;
      height: 72px;
      border-radius: 9999px;
      border: 6px solid #d3e4fe;
      border-top-color: #000000;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body class="text-[#0b1c30] antialiased">
  <main class="min-h-screen flex items-center justify-center px-6">
    <section class="w-full max-w-2xl rounded-[2rem] bg-white p-10 text-center shadow-2xl shadow-slate-900/5">
      <p class="inline-flex items-center gap-2 rounded-full bg-[#6ffbbe]/30 px-3 py-1 text-[10px] font-black uppercase tracking-widest text-[#005236]">
        <span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">sync</span>
        Processing
      </p>
      <h1 class="mt-5 text-4xl font-black tracking-[-0.02em]">Analyzing Uploaded Video</h1>
      <p class="mt-3 text-sm text-[#45464d]">Face matching and forensic checks are running. You will be redirected to verification results automatically.</p>

      <div class="mt-8 flex justify-center">
        <div class="loader" aria-label="Loading"></div>
      </div>

      <div class="mt-8 rounded-xl bg-[#eff4ff] px-4 py-3 text-xs text-[#45464d]">
        Secure pipeline active: biometric extraction, liveness scoring, and anomaly checks in progress.
      </div>

      <a class="mt-6 inline-flex items-center gap-2 rounded-xl bg-black px-5 py-3 text-sm font-bold text-white" href="../veririsk_ai_verification_results/verification-results.html">
        <span class="material-symbols-outlined text-sm">arrow_forward</span>
        View Results Now
      </a>
    </section>
  </main>
</body>
</html>
