openapi: 3.1.0
info:
  title: VerifyIQ API
  version: 1.0.0
paths:
  /v1/verify/upload:
    post:
      tags:
      - verify
      summary: Upload Verification
      operationId: upload_verification_v1_verify_upload_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyUploadRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyUploadEnvelope'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    ErrorCode:
      type: string
      enum:
      - VALIDATION_ERROR
      - SESSION_NOT_FOUND
      - SESSION_EXPIRED
      - INVALID_FRAME
      - INVALID_IMAGE
      - INVALID_VIDEO
      - RATE_LIMITED
      - UNAUTHORIZED
      - FORBIDDEN
      - INTERNAL_ERROR
      - IDEMPOTENCY_CONFLICT
      title: ErrorCode
    ErrorResponse:
      properties:
        error_code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
          title: Message
        details:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Details
      type: object
      required:
      - error_code
      - message
      title: ErrorResponse
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    InputType:
      type: string
      enum:
      - image
      - video
      title: InputType
    ResponseMeta:
      properties:
        request_id:
          type: string
          title: Request Id
        timestamp:
          type: string
          format: date-time
          title: Timestamp
      type: object
      required:
      - request_id
      - timestamp
      title: ResponseMeta
    SignalBreakdown:
      properties:
        spatial_fake_score:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Spatial Fake Score
        frequency_fake_score:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Frequency Fake Score
        temporal_score:
          anyOf:
          - type: number
            maximum: 1.0
            minimum: 0.0
          - type: 'null'
          title: Temporal Score
        behavioral_score:
          anyOf:
          - type: number
            maximum: 1.0
            minimum: 0.0
          - type: 'null'
          title: Behavioral Score
      type: object
      required:
      - spatial_fake_score
      - frequency_fake_score
      title: SignalBreakdown
    SignalFlags:
      properties:
        artifact_flag:
          type: boolean
          title: Artifact Flag
          default: false
        frequency_anomaly:
          type: boolean
          title: Frequency Anomaly
          default: false
        temporal_inconsistency:
          type: boolean
          title: Temporal Inconsistency
          default: false
        watermark_detected:
          type: boolean
          title: Watermark Detected
          default: false
      type: object
      title: SignalFlags
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    Verdict:
      type: string
      enum:
      - ACCEPT
      - REVIEW
      - REJECT
      title: Verdict
    VerifyUploadEnvelope:
      properties:
        success:
          type: boolean
          title: Success
        data:
          anyOf:
          - $ref: '#/components/schemas/VerifyUploadResponse'
          - type: 'null'
        error:
          anyOf:
          - $ref: '#/components/schemas/ErrorResponse'
          - type: 'null'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
      type: object
      required:
      - success
      - meta
      title: VerifyUploadEnvelope
    VerifyUploadRequest:
      properties:
        user_id:
          type: string
          title: User Id
        input_type:
          $ref: '#/components/schemas/InputType'
        file:
          type: string
          title: File
      type: object
      required:
      - user_id
      - input_type
      - file
      title: VerifyUploadRequest
    VerifyUploadResponse:
      properties:
        verdict:
          $ref: '#/components/schemas/Verdict'
        confidence:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Confidence
        signals:
          $ref: '#/components/schemas/SignalBreakdown'
        flags:
          $ref: '#/components/schemas/SignalFlags'
      type: object
      required:
      - verdict
      - confidence
      - signals
      - flags
      title: VerifyUploadResponse
